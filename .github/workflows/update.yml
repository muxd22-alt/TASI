name: Update Market Data

on:
  # Run daily at 6 AM Riyadh time (3 AM UTC)
  schedule:
    - cron: '0 3 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force refresh even if no changes expected'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  actions: write

env:
  PYTHON_VERSION: '3.11'
  PIP_CACHE_DIR: ${{ github.workspace }}/.cache/pip
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade -r requirements.txt

      - name: Fetch market data
        id: fetch
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI }}
        run: |
          echo "::group::Fetch Output"
          python scripts/fetch_data.py
          FETCH_EXIT_CODE=$?
          echo "::endgroup::"
          echo "exit_code=$FETCH_EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Check for data changes
        id: git-check
        run: |
          if git diff --quiet docs/data.json 2>/dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No data changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Data changes detected"
            git diff --stat docs/data.json
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.has_changes == 'true' && steps.fetch.outputs.exit_code == '0'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/data.json
          git commit -m "chore(data): update market data $(date -u '+%Y-%m-%d %H:%M UTC')"
          
          echo "Pushing changes..."
          if git push; then
            echo "✓ Successfully pushed data update"
          else
            echo "::warning::Failed to push changes"
            exit 1
          fi

      - name: Generate summary
        run: |
          echo "## Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          
          if [ -f docs/data.json ]; then
            TASI_CLOSE=$(python -c "import json; d=json.load(open('docs/data.json')); print(f\"{d['tasi']['close'][-1]:.2f}\")")
            QQQ_CLOSE=$(python -c "import json; d=json.load(open('docs/data.json')); print(f\"{d['qqq']['close'][-1]:.2f}\")")
            NEWS_COUNT=$(python -c "import json; d=json.load(open('docs/data.json')); print(len(d.get('news', [])))")
            TIMESTAMP=$(python -c "import json; d=json.load(open('docs/data.json')); print(d.get('timestamp', 'N/A')[:19])")
            
            echo "| TASI Close | $TASI_CLOSE |" >> $GITHUB_STEP_SUMMARY
            echo "| QQQ Close | $QQQ_CLOSE |" >> $GITHUB_STEP_SUMMARY
            echo "| News Articles | $NEWS_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "| Timestamp | $TIMESTAMP |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | Data file not found |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.fetch.outputs.exit_code }}" == "0" ]; then
            if [ "${{ steps.git-check.outputs.has_changes }}" == "true" ]; then
              echo "✅ Data updated and pushed successfully" >> $GITHUB_STEP_SUMMARY
            else
              echo "ℹ️ No data changes to commit" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ Data fetch failed (exit code: ${{ steps.fetch.outputs.exit_code }})" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Market data update failed. Please check the workflow logs."
          echo "Failure notification: The scheduled market data update failed at $(date -u '+%Y-%m-%d %H:%M UTC')"

  health-check:
    needs: update-data
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check workflow status
        run: |
          echo "Workflow completed with status: ${{ needs.update-data.result }}"
          if [ "${{ needs.update-data.result }}" == "success" ]; then
            echo "✓ All jobs completed successfully"
          elif [ "${{ needs.update-data.result }}" == "skipped" ]; then
            echo "⊘ Job was skipped"
          else
            echo "✗ Job failed or was cancelled"
          fi
